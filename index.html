<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Médiateurs & Arbitres — CMAP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0B1F3A;
      --navy-mid: #1a3558;
      --gold: #C8A96E;
      --gold-light: #e8d5a8;
      --cream: #F7F5F0;
      --white: #ffffff;
      --text: #0B1F3A;
      --text-muted: #5a6a7e;
      --text-faint: #9aa5b1;
      --border: rgba(11,31,58,0.1);
      --border-strong: rgba(11,31,58,0.2);
      --med-bg: #EEF2F8;
      --med-text: #1a3558;
      --arb-bg: #FDF6EC;
      --arb-text: #8B6914;
      --radius: 4px;
      --radius-sm: 3px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background: var(--navy);
      padding: 0 2.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      height: 64px;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-badge {
      width: 36px;
      height: 36px;
      border: 1.5px solid var(--gold);
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-badge span {
      font-family: 'Playfair Display', serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 0.5px;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-text strong {
      font-family: 'Playfair Display', serif;
      font-size: 15px;
      font-weight: 600;
      color: var(--white);
      letter-spacing: 0.02em;
    }

    .logo-text small {
      font-size: 10px;
      color: var(--gold);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: 1px;
    }

    .header-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 16px;
      font-size: 12px;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.15s;
      text-decoration: none;
    }

    .btn-outline {
      border: 1px solid rgba(255,255,255,0.25);
      background: transparent;
      color: rgba(255,255,255,0.85);
    }

    .btn-outline:hover {
      border-color: var(--gold);
      color: var(--gold);
      background: transparent;
    }

    .btn-gold {
      border: 1px solid var(--gold);
      background: var(--gold);
      color: var(--navy);
    }

    .btn-gold:hover { opacity: 0.88; }

    .btn input[type="file"] { display: none; }

    /* HERO BAND */
    .hero-band {
      background: var(--navy-mid);
      padding: 2rem 2.5rem;
      border-bottom: 2px solid var(--gold);
    }

    .hero-band h1 {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 600;
      color: var(--white);
      letter-spacing: -0.01em;
      margin-bottom: 4px;
    }

    .hero-band p {
      font-size: 13px;
      color: var(--gold-light);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* MAIN */
    main {
      max-width: 1140px;
      margin: 0 auto;
      padding: 2rem 2rem 3rem;
    }

    /* UPLOAD BANNER */
    .upload-banner {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--white);
      border: 1px dashed var(--border-strong);
      border-radius: var(--radius);
      padding: 1rem 1.5rem;
      margin-bottom: 1.75rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      color: var(--text-muted);
    }

    .upload-banner:hover {
      border-color: var(--gold);
      background: #fffdf8;
    }

    .upload-banner i {
      font-size: 22px;
      color: var(--gold);
      flex-shrink: 0;
    }

    .upload-banner input { display: none; }

    .upload-banner strong {
      display: block;
      font-weight: 500;
      color: var(--text);
      font-size: 14px;
      margin-bottom: 2px;
    }

    .upload-banner span { font-size: 12px; }

    /* TOOLBAR */
    .toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 1.25rem;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 200px;
    }

    .search-wrap i {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-faint);
      font-size: 16px;
      pointer-events: none;
    }

    .search-wrap input {
      width: 100%;
      height: 40px;
      padding: 0 12px 0 38px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius);
      background: var(--white);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }

    .search-wrap input:focus { border-color: var(--navy); }
    .search-wrap input::placeholder { color: var(--text-faint); }

    .filter-group {
      display: flex;
      gap: 0;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--white);
    }

    .filter-btn {
      padding: 0 16px;
      height: 40px;
      font-size: 12px;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border: none;
      border-right: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.12s;
    }

    .filter-btn:last-child { border-right: none; }
    .filter-btn:hover { background: var(--cream); color: var(--navy); }
    .filter-btn.active { background: var(--navy); color: var(--white); }

    /* STATS BAR */
    .stats-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1.25rem;
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.03em;
    }

    .divider { color: var(--border-strong); }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 2px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .pill.med { background: var(--med-bg); color: var(--med-text); }
    .pill.arb { background: var(--arb-bg); color: var(--arb-text); }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
    }

    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem 1rem 1.25rem;
      text-align: center;
      transition: border-color 0.15s, box-shadow 0.15s;
      position: relative;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      border-radius: var(--radius) var(--radius) 0 0;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .card.med::before { background: var(--navy); }
    .card.arb::before { background: var(--gold); }

    .card:hover {
      border-color: var(--border-strong);
      box-shadow: 0 4px 16px rgba(11,31,58,0.08);
    }

    .card:hover::before { opacity: 1; }

    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      margin: 0 auto 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 600;
      overflow: hidden;
      flex-shrink: 0;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .avatar.med {
      background: var(--med-bg);
      color: var(--navy);
      border: 2px solid rgba(11,31,58,0.12);
    }

    .avatar.arb {
      background: var(--arb-bg);
      color: var(--arb-text);
      border: 2px solid rgba(200,169,110,0.25);
    }

    .card-name {
      font-family: 'Playfair Display', serif;
      font-size: 14px;
      font-weight: 600;
      line-height: 1.35;
      margin-bottom: 7px;
      color: var(--navy);
    }

    .role-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 2px;
      margin-bottom: 8px;
    }

    .role-badge.med { background: var(--med-bg); color: var(--med-text); }
    .role-badge.arb { background: var(--arb-bg); color: var(--arb-text); }

    .card-city {
      font-size: 11px;
      color: var(--text-faint);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      letter-spacing: 0.03em;
    }

    /* EMPTY STATE */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .empty-state i { font-size: 32px; display: block; margin-bottom: 12px; color: var(--text-faint); }
    .empty-state p { font-size: 14px; }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: var(--navy);
      color: var(--white);
      border-left: 3px solid var(--gold);
      padding: 10px 16px;
      border-radius: var(--radius);
      font-size: 13px;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 100;
    }

    .toast.show { opacity: 1; transform: translateY(0); }

    /* FOOTER */
    footer {
      background: var(--navy);
      color: rgba(255,255,255,0.45);
      text-align: center;
      padding: 1.25rem 2rem;
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border-top: 2px solid var(--gold);
    }

    footer strong { color: var(--gold); }

    /* PRINT */
    @media print {
      header, .hero-band .hero-band-actions, .upload-banner, .toolbar, .stats-bar, footer { display: none !important; }
      .hero-band { padding: 1rem 1.5rem; }
      body { background: #fff; }
      .grid { grid-template-columns: repeat(5, 1fr); gap: 8px; }
      .card { border: 1px solid #ddd; break-inside: avoid; padding: 1rem 0.75rem; }
      .card::before { display: none; }
    }

    @media (max-width: 600px) {
      header { height: auto; padding: 1rem; }
      .hero-band { padding: 1.25rem 1rem; }
      main { padding: 1rem; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-area">
    <div class="logo-badge"><span>CM</span></div>
    <div class="logo-text">
      <strong>Médiateurs & Arbitres</strong>
      <small>Annuaire interne</small>
    </div>
  </div>
  <div class="header-actions">
    <label class="btn btn-outline" tabindex="0">
      <i class="ti ti-upload" aria-hidden="true"></i> Importer CSV
      <input type="file" id="csvInputHeader" accept=".csv" onchange="loadCSV(event)">
    </label>
    <button class="btn btn-gold" onclick="window.print()">
      <i class="ti ti-printer" aria-hidden="true"></i> Imprimer
    </button>
  </div>
</header>

<div class="hero-band">
  <h1>Notre réseau de médiateurs et arbitres</h1>
  <p id="hero-subtitle">Chargement de l'annuaire…</p>
</div>

<main>

  <label class="upload-banner" for="csvInputBanner">
    <i class="ti ti-file-spreadsheet" aria-hidden="true"></i>
    <div>
      <strong>Mettre à jour l'annuaire depuis Eudonet</strong>
      <span>Importez votre export CSV — le séparateur et les colonnes sont détectés automatiquement</span>
    </div>
    <input type="file" id="csvInputBanner" accept=".csv" onchange="loadCSV(event)">
  </label>

  <div class="toolbar">
    <div class="search-wrap">
      <i class="ti ti-search" aria-hidden="true"></i>
      <input type="text" id="search" placeholder="Rechercher par nom ou ville…" oninput="render()" aria-label="Rechercher">
    </div>
    <div class="filter-group" role="group" aria-label="Filtrer par rôle">
      <button class="filter-btn active" onclick="setFilter('tous', event)">Tous</button>
      <button class="filter-btn" onclick="setFilter('Médiateur', event)">Médiateurs</button>
      <button class="filter-btn" onclick="setFilter('Arbitre', event)">Arbitres</button>
    </div>
  </div>

  <div class="stats-bar" id="stats-bar" aria-live="polite"></div>
  <div class="grid" id="grid" role="list"></div>

</main>

<footer>
  <strong>Annuaire interne</strong> — Document confidentiel, réservé à usage interne
</footer>

<div class="toast" id="toast"></div>

<script>
  const SAMPLE = [
    {prenom:"Sophie",nom:"Martin",role:"Médiateur",ville:"Paris",photo:"https://i.pravatar.cc/150?img=47"},
    {prenom:"Jean-Pierre",nom:"Dubois",role:"Médiateur",ville:"Lyon",photo:"https://i.pravatar.cc/150?img=12"},
    {prenom:"Isabelle",nom:"Bernard",role:"Arbitre",ville:"Marseille",photo:"https://i.pravatar.cc/150?img=49"},
    {prenom:"Marc",nom:"Lefebvre",role:"Médiateur",ville:"Bordeaux",photo:""},
    {prenom:"Nathalie",nom:"Moreau",role:"Arbitre",ville:"Toulouse",photo:"https://i.pravatar.cc/150?img=44"},
    {prenom:"François",nom:"Simon",role:"Médiateur",ville:"Nantes",photo:""},
    {prenom:"Claire",nom:"Laurent",role:"Arbitre",ville:"Strasbourg",photo:"https://i.pravatar.cc/150?img=45"},
    {prenom:"Philippe",nom:"Rousseau",role:"Médiateur",ville:"Lille",photo:""},
    {prenom:"Marie",nom:"Fontaine",role:"Médiateur",ville:"Nice",photo:"https://i.pravatar.cc/150?img=48"},
    {prenom:"Thierry",nom:"Gauthier",role:"Arbitre",ville:"Rennes",photo:"https://i.pravatar.cc/150?img=15"},
    {prenom:"Céline",nom:"Dupont",role:"Médiateur",ville:"Montpellier",photo:""},
    {prenom:"Éric",nom:"Mercier",role:"Arbitre",ville:"Grenoble",photo:"https://i.pravatar.cc/150?img=11"},
    {prenom:"Sandrine",nom:"Girard",role:"Médiateur",ville:"Paris",photo:"https://i.pravatar.cc/150?img=46"},
    {prenom:"David",nom:"Bonnet",role:"Arbitre",ville:"Lyon",photo:""},
    {prenom:"Valérie",nom:"Lemaire",role:"Médiateur",ville:"Bordeaux",photo:"https://i.pravatar.cc/150?img=43"},
    {prenom:"Patrick",nom:"Renard",role:"Arbitre",ville:"Marseille",photo:""},
    {prenom:"Aurélie",nom:"Marchand",role:"Médiateur",ville:"Nantes",photo:"https://i.pravatar.cc/150?img=41"},
    {prenom:"Bruno",nom:"Morel",role:"Arbitre",ville:"Paris",photo:"https://i.pravatar.cc/150?img=13"},
    {prenom:"Hélène",nom:"Fournier",role:"Médiateur",ville:"Toulouse",photo:""},
    {prenom:"Olivier",nom:"Giraud",role:"Arbitre",ville:"Strasbourg",photo:"https://i.pravatar.cc/150?img=14"},
    {prenom:"Laure",nom:"Caron",role:"Médiateur",ville:"Lille",photo:""},
    {prenom:"Sébastien",nom:"Blanc",role:"Arbitre",ville:"Nice",photo:"https://i.pravatar.cc/150?img=10"},
    {prenom:"Agnès",nom:"Perrin",role:"Médiateur",ville:"Rennes",photo:""},
    {prenom:"Nicolas",nom:"Faure",role:"Arbitre",ville:"Grenoble",photo:"https://i.pravatar.cc/150?img=16"},
  ];

  let data = [...SAMPLE];
  let filter = 'tous';

  function initials(p) {
    return ((p.prenom||'?')[0] + (p.nom||'?')[0]).toUpperCase();
  }

  function avatarHTML(p) {
    const cls = p.role === 'Médiateur' ? 'med' : 'arb';
    if (p.photo && p.photo.trim()) {
      const safe = p.photo.trim().replace(/"/g,'&quot;');
      const fb = initials(p).replace(/'/g,"\\'");
      return `<div class="avatar ${cls}"><img src="${safe}" alt="${p.prenom} ${p.nom}" onerror="this.parentElement.innerHTML='${fb}';"></div>`;
    }
    return `<div class="avatar ${cls}">${initials(p)}</div>`;
  }

  function setFilter(f, e) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    render();
  }

  function render() {
    const q = document.getElementById('search').value.toLowerCase();
    const filtered = data.filter(p => {
      const matchRole = filter === 'tous' || p.role === filter;
      const matchQ = !q || (p.prenom+' '+p.nom).toLowerCase().includes(q) || (p.ville||'').toLowerCase().includes(q);
      return matchRole && matchQ;
    });

    const med = data.filter(p => p.role === 'Médiateur').length;
    const arb = data.filter(p => p.role === 'Arbitre').length;

    document.getElementById('hero-subtitle').textContent =
      med + ' médiateurs · ' + arb + ' arbitres';

    document.getElementById('stats-bar').innerHTML =
      `<span>${filtered.length} personne${filtered.length>1?'s':''} affichée${filtered.length>1?'s':''}</span>
       <span class="divider">·</span>
       <span class="pill med">${med} médiateurs</span>
       <span class="pill arb">${arb} arbitres</span>`;

    const grid = document.getElementById('grid');
    if (!filtered.length) {
      grid.innerHTML = `<div class="empty-state">
        <i class="ti ti-search-off" aria-hidden="true"></i>
        <p>Aucune personne ne correspond à cette recherche.</p>
      </div>`;
      return;
    }

    grid.innerHTML = filtered.map(p => {
      const cls = p.role === 'Médiateur' ? 'med' : 'arb';
      return `<div class="card ${cls}" role="listitem">
        ${avatarHTML(p)}
        <div class="card-name">${p.prenom} ${p.nom}</div>
        <span class="role-badge ${cls}">${p.role}</span>
        ${p.ville ? `<div class="card-city"><i class="ti ti-map-pin" aria-hidden="true" style="font-size:11px;"></i>${p.ville}</div>` : ''}
      </div>`;
    }).join('');
  }

  function normalize(h) {
    return h.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim().replace(/^"|"$/g,'');
  }

  function findCol(headers, candidates) {
    for (const c of candidates) {
      const idx = headers.findIndex(h => normalize(h) === c);
      if (idx !== -1) return idx;
    }
    return -1;
  }

  function loadCSV(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      const raw = ev.target.result;
      const sep = (raw.split(';').length > raw.split(',').length) ? ';' : ',';
      const lines = raw.trim().split(/\r?\n/);
      if (lines.length < 2) return;
      const headers = lines[0].split(sep);
      const iPrenom = findCol(headers, ['prenom','firstname','first name','first_name','givenname']);
      const iNom    = findCol(headers, ['nom','name','lastname','last name','last_name','familyname','surname']);
      const iRole   = findCol(headers, ['role','type','fonction','categorie','profil']);
      const iVille  = findCol(headers, ['ville','city','localite','commune']);
      const iPhoto  = findCol(headers, ['photo','image','photo_url','image_url','url_photo','avatar','picture']);
      const parsed = [];
      for (let i = 1; i < lines.length; i++) {
        if (!lines[i].trim()) continue;
        const vals = lines[i].split(sep).map(v => v.replace(/^"|"$/g,'').trim());
        const p = {
          prenom: iPrenom !== -1 ? vals[iPrenom] : '',
          nom:    iNom    !== -1 ? vals[iNom]    : '',
          role:   iRole   !== -1 ? vals[iRole]   : 'Médiateur',
          ville:  iVille  !== -1 ? vals[iVille]  : '',
          photo:  iPhoto  !== -1 ? vals[iPhoto]  : ''
        };
        if (p.nom || p.prenom) parsed.push(p);
      }
      if (parsed.length) {
        data = parsed;
        render();
        showToast(parsed.length + ' personnes importées depuis ' + file.name);
      } else {
        showToast('Aucune donnée reconnue dans ce fichier.');
      }
      e.target.value = '';
    };
    reader.readAsText(file, 'UTF-8');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3500);
  }

  render();
</script>
</body>
</html>
